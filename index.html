<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Clone</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .post { border-bottom: 1px solid #ccc; padding: 10px; }
        .like, .comment { cursor: pointer; color: blue; }
        .chat-box { border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 10px; }
        input, textarea { width: 100%; margin-top: 10px; padding: 8px; }
        button { background: blue; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Facebook Clone</h1>
    <div class="container">
        <h2>Login</h2>
        <button onclick="googleSignIn()">Sign in with Google</button>
        <h2>Post Feed</h2>
        <div id="posts"></div>
        <textarea id="postContent" placeholder="Write a post..."></textarea>
        <button onclick="addPost()">Post</button>
    </div>
    
    <div class="container">
        <h2>Chat Box</h2>
        <div class="chat-box" id="chat"></div>
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
    
    <script>
        function googleSignIn() {
            alert('Google Sign-In simulated!');
        }
        
        function addPost() {
            let content = document.getElementById('postContent').value;
            let posts = document.getElementById('posts');
            let postDiv = document.createElement('div');
            postDiv.classList.add('post');
            postDiv.innerHTML = `<p>${content}</p><span class='like' onclick='likePost(this)'>Like</span> | <span class='comment' onclick='commentPost(this)'>Comment</span>`;
            posts.prepend(postDiv);
            document.getElementById('postContent').value = '';
        }
        
        function likePost(element) {
            alert('Liked!');
        }
        
        function commentPost(element) {
            let comment = prompt('Enter your comment:');
            if (comment) {
                let commentNode = document.createElement('p');
                commentNode.innerText = `Comment: ${comment}`;
                element.parentNode.appendChild(commentNode);
            }
        }
        
        function sendMessage() {
            let msg = document.getElementById('chatInput').value;
            let chat = document.getElementById('chat');
            let msgDiv = document.createElement('p');
            msgDiv.innerText = msg;
            chat.appendChild(msgDiv);
            document.getElementById('chatInput').value = '';
        }
    </script>
</body>
</html>
